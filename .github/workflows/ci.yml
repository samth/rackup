name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pages-build:
    name: Pages Build
    runs-on: ubuntu-latest
    needs:
      - build-exe
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Racket
        uses: Bogdanp/setup-racket@fda0f4d167468421766cea8a36140bd2c3c3450d # v1.14
        with:
          architecture: x64
          distribution: full
          variant: CS
          version: stable
      - name: Install Pages build deps
        shell: bash
        run: raco pkg install --auto --skip-installed --batch plt-web
      - name: Download all exe artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: rackup-exe-*
          path: /tmp/exe-artifacts
      - name: Build Pages site
        shell: bash
        run: |
          racket -y pages/build-pages-site.rkt /tmp/rackup-pages-site
          test -f /tmp/rackup-pages-site/index.html
          test -f /tmp/rackup-pages-site/install.sh
          test -f /tmp/rackup-pages-site/rackup-src.tar.gz
          grep -Fq 'btn.innerHTML' /tmp/rackup-pages-site/index.html
          grep -Fq 'sha256sum -c' /tmp/rackup-pages-site/index.html
          # Every user-facing command from `rackup help` must appear on the webpage.
          # Internal commands (help, shell, runtime) are excluded.
          missing=0
          for cmd in $(racket libexec/rackup-core.rkt help 2>&1 | grep -oP '^\s+\S+' | awk '{print $1}'); do
            case "$cmd" in help|shell|runtime) continue ;; esac
            grep -Fq "rackup $cmd" /tmp/rackup-pages-site/index.html || {
              echo "ERROR: command 'rackup $cmd' missing from webpage" >&2
              missing=1
            }
          done
          if [ "$missing" -eq 1 ]; then exit 1; fi
          if tar -tzf /tmp/rackup-pages-site/rackup-src.tar.gz | grep -En '(^|/)compiled(/|$)|\.(zo|dep)$'; then
            echo "rackup-src.tar.gz unexpectedly contains compiled artifacts" >&2
            exit 1
          fi
          # Copy prebuilt binary tarballs into the pages site with SHA-256 sidecar files
          for artifact_dir in /tmp/exe-artifacts/rackup-exe-*/; do
            for tarball in "$artifact_dir"*.tar.gz; do
              [ -f "$tarball" ] || continue
              base="$(basename "$tarball")"
              cp "$tarball" "/tmp/rackup-pages-site/$base"
              sha256sum "$tarball" | sed "s|  .*/|  |" > "/tmp/rackup-pages-site/${base}.sha256"
              echo "Added binary dist: $base (+ .sha256)"
            done
          done
          tar -C /tmp/rackup-pages-site -czf /tmp/pages-site-ci.tar.gz .
      - name: Upload Pages site artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pages-site-ci
          path: /tmp/pages-site-ci.tar.gz
          if-no-files-found: error

  install-sh-e2e:
    name: "Install.sh E2E (${{ matrix.name }})"
    runs-on: ${{ matrix.runs_on }}
    needs: [pages-build]
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native Linux exe targets
          - name: x86_64-linux
            runs_on: ubuntu-latest
            docker_platform: linux/amd64
            expect_mode: exe
            toolchain_spec: "stable"
            toolchain_flags: "--distribution minimal"
            install_flags: ""
          - name: aarch64-linux
            runs_on: ubuntu-24.04-arm
            docker_platform: linux/arm64
            expect_mode: exe
            toolchain_spec: "stable"
            toolchain_flags: "--distribution minimal"
            install_flags: ""
          # Cross-compiled Linux exe targets (via QEMU)
          - name: arm32-linux
            runs_on: ubuntu-latest
            docker_platform: linux/arm/v7
            expect_mode: exe
            toolchain_spec: "stable"
            toolchain_flags: "--distribution minimal"
            install_flags: ""
          - name: i386-linux
            runs_on: ubuntu-latest
            docker_platform: linux/386
            expect_mode: exe
            toolchain_spec: "stable"
            toolchain_flags: "--distribution minimal"
            install_flags: ""
          # macOS exe targets
          - name: x86_64-macosx
            runs_on: macos-15-intel
            docker_platform: ""
            expect_mode: exe
            toolchain_spec: "stable"
            toolchain_flags: "--distribution minimal"
            install_flags: ""
          - name: aarch64-macosx
            runs_on: macos-14
            docker_platform: ""
            expect_mode: exe
            toolchain_spec: "stable"
            toolchain_flags: "--distribution minimal"
            install_flags: ""
          - name: aarch64-macosx-sequoia
            runs_on: macos-15
            docker_platform: ""
            expect_mode: exe
            toolchain_spec: "stable"
            toolchain_flags: "--distribution minimal"
            install_flags: ""
          # Non-exe: source fallback (x86_64 with --source flag)
          - name: x86_64-linux-source
            runs_on: ubuntu-latest
            docker_platform: linux/amd64
            expect_mode: source
            toolchain_spec: "stable"
            toolchain_flags: "--distribution minimal"
            install_flags: "--source"
    steps:
      - name: Download pages site
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pages-site-ci
          path: /tmp/pages-artifact
      - name: Extract pages site
        shell: bash
        run: |
          mkdir -p /tmp/pages-site
          tar -xzf /tmp/pages-artifact/pages-site-ci.tar.gz -C /tmp/pages-site
          ls -la /tmp/pages-site/rackup-*.tar.gz /tmp/pages-site/install.sh
      - name: Set up QEMU
        if: matrix.docker_platform == 'linux/arm/v7' || matrix.docker_platform == 'linux/386'
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          platforms: arm,386
      - name: Start local HTTP server
        shell: bash
        run: |
          python3 -m http.server 18765 --directory /tmp/pages-site &
          echo $! > /tmp/pages-http-server.pid
          # Wait for the server to be ready (up to 30s)
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:18765/install.sh >/dev/null 2>&1; then
              echo "HTTP server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "HTTP server failed to start within 30s" >&2
          exit 1
      - name: "Install.sh E2E (Docker: ${{ matrix.name }})"
        if: matrix.docker_platform != ''
        shell: bash
        run: |
          docker run --rm \
            --network host \
            --platform "${{ matrix.docker_platform }}" \
            -e RACKUP_PAGES_BASE_URL=http://localhost:18765 \
            -e TOOLCHAIN_SPEC="${{ matrix.toolchain_spec }}" \
            -e TOOLCHAIN_FLAGS="${{ matrix.toolchain_flags }}" \
            -e EXPECT_MODE="${{ matrix.expect_mode }}" \
            -e INSTALL_FLAGS="${{ matrix.install_flags }}" \
            debian:12 bash -c '
              set -eux

              # Install curl (needed for curl|sh)
              apt-get update -qq && apt-get install -y -qq curl ca-certificates >/dev/null 2>&1

              # Run install.sh from the local pages server
              curl -fsSL http://localhost:18765/install.sh | sh -s -- -y --no-init $INSTALL_FLAGS

              export PATH="$HOME/.rackup/shims:$HOME/.rackup/bin:$PATH"
              export RACKUP_HOME="$HOME/.rackup"

              # Verify rackup runs
              rackup version
              rackup doctor

              # Verify install mode
              if [ -x "$HOME/.rackup/bin/rackup-core" ]; then
                actual_mode=exe
              else
                actual_mode=source
              fi
              echo "Install mode: $actual_mode (expected: $EXPECT_MODE)"
              if [ "$actual_mode" != "$EXPECT_MODE" ]; then
                echo "ERROR: install mode mismatch" >&2
                exit 1
              fi

              # Install a toolchain and run racket (if spec provided)
              if [ -n "$TOOLCHAIN_SPEC" ]; then
                rackup install "$TOOLCHAIN_SPEC" $TOOLCHAIN_FLAGS --set-default
                rackup list
                racket -e "(displayln (version))"
                raco --help >/dev/null
              fi
            '
      - name: "Install.sh E2E (macOS: ${{ matrix.name }})"
        if: matrix.docker_platform == ''
        shell: bash
        run: |
          set -eux
          export RACKUP_HOME="$(mktemp -d)/rackup-install-sh-e2e"
          export RACKUP_PAGES_BASE_URL=http://localhost:18765

          # Run install.sh from the local pages server
          curl -fsSL http://localhost:18765/install.sh | sh -s -- -y --no-init --prefix "$RACKUP_HOME" ${{ matrix.install_flags }}

          export PATH="$RACKUP_HOME/shims:$RACKUP_HOME/bin:$PATH"

          # Verify rackup runs
          rackup version
          rackup doctor

          # Verify install mode
          if [ -x "$RACKUP_HOME/bin/rackup-core" ]; then
            actual_mode=exe
          else
            actual_mode=source
          fi
          echo "Install mode: $actual_mode (expected: ${{ matrix.expect_mode }})"
          if [ "$actual_mode" != "${{ matrix.expect_mode }}" ]; then
            echo "ERROR: install mode mismatch" >&2
            exit 1
          fi

          # Install a toolchain and run racket
          if [ -n "${{ matrix.toolchain_spec }}" ]; then
            rackup install "${{ matrix.toolchain_spec }}" ${{ matrix.toolchain_flags }} --set-default
            rackup list
            racket -e '(displayln (version))'
            raco --help >/dev/null
          fi

          # Self-upgrade: reinstall over the existing prebuilt binary.
          # This catches code signing issues on macOS where the new binary
          # is killed by the kernel after being downloaded and extracted.
          if [ "${{ matrix.expect_mode }}" = "exe" ]; then
            echo "=== Self-upgrade smoke test ==="
            rackup self-upgrade --exe
            rackup version
            rackup doctor
            echo "Self-upgrade OK"
          fi
      - name: Stop HTTP server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/pages-http-server.pid ]; then
            kill "$(cat /tmp/pages-http-server.pid)" 2>/dev/null || true
          fi

  build-exe:
    uses: ./.github/workflows/build-exe.yml

  unit-tests:
    name: Unit Tests (${{ matrix.arch_name }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            arch_name: x64
            setup_racket_arch: x64
          - runs_on: ubuntu-24.04-arm
            arch_name: arm64
            setup_racket_arch: arm64
          - runs_on: macos-15-intel
            arch_name: x64-macos
            setup_racket_arch: x64
          - runs_on: macos-15
            arch_name: arm64-macos
            setup_racket_arch: arm64
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Racket
        uses: Bogdanp/setup-racket@fda0f4d167468421766cea8a36140bd2c3c3450d # v1.14
        with:
          architecture: ${{ matrix.setup_racket_arch }}
          distribution: full
          variant: CS
          version: stable
      - name: Build
        shell: bash
        run: raco make libexec/rackup-core.rkt libexec/rackup/*.rkt
      - name: Install test deps
        shell: bash
        run: raco pkg install --auto recspecs
      - name: Test (includes local-link unit coverage)
        shell: bash
        run: TMPDIR=/tmp raco test -y test/all.rkt

  docker-e2e-linux-distros:
    name: "Docker E2E (native ${{ matrix.arch_name }} / ${{ matrix.base_image }})"
    needs: [unit-tests]
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            arch_name: x64
            docker_arch: amd64
            base_image: "ubuntu:24.04"
          - runs_on: ubuntu-24.04-arm
            arch_name: arm64
            docker_arch: arm64
            base_image: "ubuntu:24.04"
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Docker bootstrap install smoke on distro
        run: |
          test/docker-test-fresh-install.sh \
            --mode bootstrap \
            --host-racket absent \
            --base-image "${{ matrix.base_image }}" \
            --platform "linux/${{ matrix.docker_arch }}" \
            --spec stable \
            --spec 8.18

  docker-e2e-qemu-platform-probe:
    name: "Docker QEMU Detect (${{ matrix.platform }} => ${{ matrix.expected_arch }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/arm/v7
            expected_arch: arm
            base_image: debian:13
          - platform: linux/386
            expected_arch: i386
            base_image: debian:13
          - platform: linux/riscv64
            expected_arch: riscv64
            base_image: debian:13
          - platform: linux/ppc64le
            expected_arch: ppc
            base_image: debian:13
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          platforms: arm,386,riscv64,ppc64le
      - name: Probe arch/platform detection
        run: |
          test/qemu-platform-probe.sh \
            --platform "${{ matrix.platform }}" \
            --expected-arch "${{ matrix.expected_arch }}" \
            --base-image "${{ matrix.base_image }}" \
            --mode detect

  docker-e2e-direct:
    name: Docker E2E (direct, stable + older + local link)
    needs: [unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Docker fresh-container installs and local-link smoke
        run: |
          test/docker-test-fresh-install.sh \
            --spec stable \
            --spec 8.18 \
            --spec 7.9

  docker-e2e-legacy-6_0:
    name: Docker E2E (legacy 6.0 install smoke)
    needs: [unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Docker legacy 6.0 install smoke
        run: |
          test/docker-test-fresh-install.sh \
            --spec 6.0 \
            --skip-package-tests

  docker-e2e-prerelease:
    name: Docker E2E (pre-release.racket-lang.org)
    needs: [unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Docker pre-release fresh-container install
        run: |
          test/docker-test-fresh-install.sh \
            --spec pre-release

  native-i386-vm-103p1:
    name: Native i386 VM (103p1 smoke)
    needs: [unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install QEMU VM dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils xorriso cpio gzip curl
      - name: Restore native i386 VM downloads cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .ci-cache/native-i386-vm/downloads
          key: native-i386-vm-downloads-${{ hashFiles('test/native-i386-vm-test.sh') }}
          restore-keys: |
            native-i386-vm-downloads-
      - name: Restore native i386 VM guest disk cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .ci-cache/native-i386-vm/debian-i386.qcow2
          key: native-i386-vm-disk-v1-${{ hashFiles('test/native-i386-vm-test.sh', 'test/ci-native-i386-vm-smoke.sh', 'test/vm/native-i386-firstboot.sh', 'test/vm/native-i386-firstboot.service') }}
          restore-keys: |
            native-i386-vm-disk-v1-
      - name: Native i386 103p1 smoke
        shell: bash
        run: |
          chmod +x test/native-i386-vm-test.sh test/ci-native-i386-vm-smoke.sh
          test/ci-native-i386-vm-smoke.sh
      - name: Upload native i386 VM artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-i386-vm-103p1
          path: |
            .ci-cache/native-i386-vm/install-serial.log
            .ci-cache/native-i386-vm/run-serial.log
            .ci-cache/native-i386-vm/share/output
          if-no-files-found: warn

  docker-e2e-bootstrap:
    name: Docker E2E (bootstrap + local link)
    needs: [unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Docker bootstrap fresh-container install and local-link smoke
        run: |
          test/docker-test-fresh-install.sh \
            --mode bootstrap \
            --spec stable

  docker-e2e-upgrade-path:
    name: Docker E2E (upgrade 9.0 -> stable + snapshot sites)
    needs: [unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Docker upgrade path and snapshot site smoke
        run: |
          test/docker-test-fresh-install.sh \
            --spec stable \
            --snapshot-site auto

  docker-e2e-snapshot-utah:
    name: Docker E2E (snapshot:utah explicit)
    needs: [unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Docker snapshot install from Utah
        run: |
          test/docker-test-fresh-install.sh \
            --spec stable \
            --snapshot-site utah

  docker-e2e-snapshot-northwestern:
    name: Docker E2E (snapshot:northwestern explicit)
    needs: [unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Docker snapshot install from Northwestern
        run: |
          test/docker-test-fresh-install.sh \
            --spec stable \
            --snapshot-site northwestern

  docker-e2e-source-build-link:
    name: Docker E2E (real source build local link)
    needs: [unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Docker source-build local-link smoke
        run: |
          test/docker-test-fresh-install.sh \
            --spec stable \
            --local-link-mode build \
            --source-build-ref v8.18 \
            --source-build-commit 657a006747c199241b2569b56e07f26585eb0437 \
            --source-build-target base \
            --source-build-jobs "$(nproc)" \
            --exercise-rebuild

  macos-e2e:
    name: "macOS E2E (${{ matrix.runner }})"
    needs: [unit-tests]
    runs-on: ${{ matrix.runner }}
    env:
      RACKUP_ALLOW_SYSTEM_RACKET: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel       # Intel x86_64
            setup_racket_arch: x64
          - runner: macos-15       # Apple Silicon arm64
            setup_racket_arch: arm64
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Racket
        uses: Bogdanp/setup-racket@fda0f4d167468421766cea8a36140bd2c3c3450d # v1.14
        with:
          architecture: ${{ matrix.setup_racket_arch }}
          distribution: full
          variant: CS
          version: stable
      - name: Build
        shell: bash
        run: raco make libexec/rackup-core.rkt libexec/rackup/*.rkt
      - name: E2E install stable (tgz)
        shell: bash
        run: |
          export RACKUP_HOME="$(mktemp -d)/rackup-e2e-tgz"
          bin/rackup install stable --set-default --installer-ext tgz --distribution minimal
          bin/rackup list
          bin/rackup doctor
          "$RACKUP_HOME/shims/racket" -e '(displayln "hello from rackup")'
          bin/rackup remove "$(bin/rackup list --ids | head -1)"
      - name: E2E install stable (dmg)
        shell: bash
        run: |
          export RACKUP_HOME="$(mktemp -d)/rackup-e2e-dmg"
          bin/rackup install stable --set-default --installer-ext dmg
          bin/rackup list
          bin/rackup doctor
          "$RACKUP_HOME/shims/racket" -e '(displayln "hello from rackup")'
          # Smoke-test DrRacket through the shim to catch issues like #37.
          "$RACKUP_HOME/shims/drracket" &
          DR_PID=$!
          sleep 10
          if kill -0 "$DR_PID" 2>/dev/null; then
            echo "DrRacket launched successfully through shim"
            kill "$DR_PID" || true
            wait "$DR_PID" 2>/dev/null || true
          else
            wait "$DR_PID" 2>/dev/null
            DR_STATUS=$?
            echo "DrRacket crashed or exited early (status $DR_STATUS)" >&2
            exit 1
          fi
          bin/rackup remove "$(bin/rackup list --ids | head -1)"
      - name: Legacy PLT Scheme DMG install (4.2.5, 4.0, 350)
        if: matrix.setup_racket_arch == 'x64'
        shell: bash
        run: |
          export RACKUP_HOME="$(mktemp -d)/rackup-legacy"
          for ver in 4.2.5 4.0 350; do
            echo "=== Installing PLT Scheme $ver (macOS DMG) ==="
            bin/rackup install "$ver" --arch i386 --verbose
            bin/rackup list
            echo "--- Installed $ver successfully ---"
            bin/rackup remove "$(bin/rackup list --ids | tail -1)"
          done

  macos-e2e-bootstrap:
    name: "macOS E2E Bootstrap (${{ matrix.runner }})"
    needs: [unit-tests]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel       # Intel x86_64
          - runner: macos-15       # Apple Silicon arm64
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Bootstrap install (no system racket)
        shell: bash
        run: |
          export RACKUP_HOME="$(mktemp -d)/rackup-bootstrap"
          export RACKUP_TESTING=1
          sh scripts/install.sh -y --from-local . --prefix "$RACKUP_HOME"
          "$RACKUP_HOME/bin/rackup" install stable --set-default
          "$RACKUP_HOME/shims/racket" -e '(displayln "bootstrap ok")'
