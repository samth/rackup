name: Build Exe

on:
  workflow_call:

jobs:
  build-exe:
    name: "Build Exe (${{ matrix.artifact_name }})"
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            artifact_name: arm32-linux
            setup_racket_arch: x64
            cross_target: arm32-linux
          - runs_on: ubuntu-latest
            artifact_name: i386-linux
            setup_racket_arch: x64
            cross_target: i386-linux
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup Racket
        uses: Bogdanp/setup-racket@v1.14
        with:
          architecture: ${{ matrix.setup_racket_arch }}
          distribution: full
          variant: CS
          version: stable
      - name: Install raco cross (cross-compilation only)
        if: matrix.cross_target != ''
        shell: bash
        run: raco pkg install --auto raco-cross
      - name: Debug cross environment (cross-compilation only)
        if: matrix.cross_target != ''
        shell: bash
        run: |
          echo "=== Racket version ==="
          racket --version
          echo "=== compiled-file-roots ==="
          racket -e '(current-compiled-file-roots)'
          echo "=== system config ==="
          racket -e '(require setup/dirs) (displayln (find-config-dir))'
          racket -e '(require setup/dirs) (with-input-from-file (build-path (find-config-dir) "config.rktd") (lambda () (displayln (read))))'
          echo "=== cross workspace host config ==="
          cat "$HOME/.local/share/racket/raco-cross/9.1/x86_64-linux-cs/etc/config.rktd" 2>/dev/null || echo "(no host config yet)"
          echo "=== Test A: rackup-core as-is ==="
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-a libexec/rackup-core.rkt && echo "as-is: OK" || echo "as-is: FAIL"
          echo "=== Patch: clear compiled-file-roots from system config ==="
          racket -e '
            (require setup/dirs)
            (define cf (build-path (find-config-dir) "config.rktd"))
            (define c (with-input-from-file cf read))
            (define nc (hash-remove c (quote compiled-file-roots)))
            (with-output-to-file cf #:exists (quote truncate/replace)
              (lambda () (write nc) (newline)))'
          echo "=== compiled-file-roots after patch ==="
          racket -e '(current-compiled-file-roots)'
          echo "=== Test B: rackup-core after clearing compiled-file-roots ==="
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-b libexec/rackup-core.rkt && echo "cleared-roots: OK" || echo "cleared-roots: FAIL"
          echo "=== Test C: rackup-core with explicit PLTCOMPILEDROOTS ==="
          PLTCOMPILEDROOTS="" raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-c libexec/rackup-core.rkt && echo "explicit-pltroots: OK" || echo "explicit-pltroots: FAIL"
      - name: Build executable distribution
        shell: bash
        run: |
          mkdir -p dist
          if [ -n "${{ matrix.cross_target }}" ]; then
            scripts/build-dist.sh \
              --cross "${{ matrix.cross_target }}" \
              --output "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          else
            scripts/build-dist.sh \
              --output "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          fi
      - name: Smoke test (native builds only)
        if: matrix.cross_target == ''
        shell: bash
        run: |
          mkdir -p /tmp/rackup-exe-test
          tar -xzf "dist/rackup-${{ matrix.artifact_name }}.tar.gz" -C /tmp/rackup-exe-test
          export RACKUP_HOME=/tmp/rackup-exe-test/rackup
          /tmp/rackup-exe-test/rackup/bin/rackup version
          /tmp/rackup-exe-test/rackup/bin/rackup help
      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: "rackup-exe-${{ matrix.artifact_name }}"
          path: "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          if-no-files-found: error
