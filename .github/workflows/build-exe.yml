name: Build Exe

on:
  workflow_call:

jobs:
  build-exe:
    name: "Build Exe (${{ matrix.artifact_name }})"
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Only cross-compilation targets for debugging
          - runs_on: ubuntu-latest
            artifact_name: arm32-linux
            setup_racket_arch: x64
            cross_target: arm32-linux
          - runs_on: ubuntu-latest
            artifact_name: i386-linux
            setup_racket_arch: x64
            cross_target: i386-linux
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup Racket
        uses: Bogdanp/setup-racket@v1.14
        with:
          architecture: ${{ matrix.setup_racket_arch }}
          distribution: full
          variant: CS
          version: stable
      - name: Install raco cross (cross-compilation only)
        if: matrix.cross_target != ''
        shell: bash
        run: raco pkg install --auto raco-cross
      - name: Debug cross environment (cross-compilation only)
        if: matrix.cross_target != ''
        shell: bash
        run: |
          echo "=== Racket version ==="
          racket --version
          echo "=== compiled-file-roots ==="
          racket -e '(current-compiled-file-roots)'
          echo "=== PLTCOMPILEDROOTS env ==="
          echo "PLTCOMPILEDROOTS=${PLTCOMPILEDROOTS:-<unset>}"
          echo "=== which racket/raco ==="
          which racket raco
          echo "=== raco-cross-lib checksum ==="
          raco pkg show raco-cross-lib
          echo "=== Test: define-runtime-path ==="
          cat > /tmp/test-drp.rkt <<'RKTEOF'
          #lang racket/base
          (require racket/runtime-path)
          (define-runtime-path here ".")
          (displayln here)
          RKTEOF
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-drp /tmp/test-drp.rkt && echo "define-runtime-path: OK" || echo "define-runtime-path: FAIL"
          echo "=== Test: racket/cmdline ==="
          cat > /tmp/test-cmdline.rkt <<'RKTEOF'
          #lang racket/base
          (require racket/cmdline)
          (command-line #:args () (displayln "ok"))
          RKTEOF
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-cmdline /tmp/test-cmdline.rkt && echo "racket/cmdline: OK" || echo "racket/cmdline: FAIL"
          echo "=== Test: racket/file ==="
          cat > /tmp/test-file.rkt <<'RKTEOF'
          #lang racket/base
          (require racket/file)
          (displayln "ok")
          RKTEOF
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-file /tmp/test-file.rkt && echo "racket/file: OK" || echo "racket/file: FAIL"
          echo "=== Test: net/url ==="
          cat > /tmp/test-net.rkt <<'RKTEOF'
          #lang racket/base
          (require net/url)
          (displayln "ok")
          RKTEOF
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-net /tmp/test-net.rkt && echo "net/url: OK" || echo "net/url: FAIL"
          echo "=== Test: multi-require like rackup ==="
          cat > /tmp/test-multi.rkt <<'RKTEOF'
          #lang racket/base
          (require racket/cmdline racket/file racket/list racket/date
                   racket/runtime-path racket/port racket/string
                   net/url)
          (define-runtime-path here ".")
          (command-line #:args () (displayln "ok"))
          RKTEOF
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-multi /tmp/test-multi.rkt && echo "multi-require: OK" || echo "multi-require: FAIL"
          echo "=== Test: rackup-core.rkt ==="
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/rackup-core-test libexec/rackup-core.rkt && echo "rackup-core: OK" || echo "rackup-core: FAIL"
      - name: Build executable distribution
        shell: bash
        run: |
          mkdir -p dist
          if [ -n "${{ matrix.cross_target }}" ]; then
            scripts/build-dist.sh \
              --cross "${{ matrix.cross_target }}" \
              --output "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          else
            scripts/build-dist.sh \
              --output "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          fi
      - name: Smoke test (native builds only)
        if: matrix.cross_target == ''
        shell: bash
        run: |
          mkdir -p /tmp/rackup-exe-test
          tar -xzf "dist/rackup-${{ matrix.artifact_name }}.tar.gz" -C /tmp/rackup-exe-test
          export RACKUP_HOME=/tmp/rackup-exe-test/rackup
          /tmp/rackup-exe-test/rackup/bin/rackup version
          /tmp/rackup-exe-test/rackup/bin/rackup help
      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: "rackup-exe-${{ matrix.artifact_name }}"
          path: "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          if-no-files-found: error
