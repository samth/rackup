name: Build Exe

on:
  workflow_call:

jobs:
  build-exe:
    name: "Build Exe (${{ matrix.artifact_name }})"
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Only cross-compilation targets for debugging
          - runs_on: ubuntu-latest
            artifact_name: arm32-linux
            setup_racket_arch: x64
            cross_target: arm32-linux
          - runs_on: ubuntu-latest
            artifact_name: i386-linux
            setup_racket_arch: x64
            cross_target: i386-linux
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup Racket
        uses: Bogdanp/setup-racket@v1.14
        with:
          architecture: ${{ matrix.setup_racket_arch }}
          distribution: full
          variant: CS
          version: stable
      - name: Install raco cross (cross-compilation only)
        if: matrix.cross_target != ''
        shell: bash
        run: raco pkg install --auto raco-cross
      - name: Debug cross environment (cross-compilation only)
        if: matrix.cross_target != ''
        shell: bash
        run: |
          echo "=== Racket version ==="
          racket --version
          echo "=== compiled-file-roots ==="
          racket -e '(current-compiled-file-roots)'
          echo "=== PLTCOMPILEDROOTS env ==="
          echo "PLTCOMPILEDROOTS=${PLTCOMPILEDROOTS:-<unset>}"
          echo "=== which racket/raco ==="
          which racket raco
          echo "=== raco-cross-lib checksum ==="
          raco pkg show raco-cross-lib
          echo "=== Narrowing remote.rkt failure ==="
          # Test net/http-client alone (remote.rkt's unique stdlib dep)
          cat > /tmp/test-http.rkt <<'RKTEOF'
          #lang racket/base
          (require net/http-client)
          (displayln "ok")
          RKTEOF
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-http /tmp/test-http.rkt && echo "net/http-client: OK" || echo "net/http-client: FAIL"
          # Test net/http-client + net/url together
          cat > /tmp/test-http2.rkt <<'RKTEOF'
          #lang racket/base
          (require net/http-client net/url)
          (displayln "ok")
          RKTEOF
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-http2 /tmp/test-http2.rkt && echo "http+url: OK" || echo "http+url: FAIL"
          # Test: remote.rkt's requires without legacy.rkt and legacy-plt-catalog.rkt
          cat > libexec/test-remote-min.rkt <<'RKTEOF'
          #lang racket/base
          (require racket/file racket/list racket/match racket/path
                   racket/port racket/string net/http-client net/url
                   "rackup/rktd-io.rkt" "rackup/util.rkt" "rackup/versioning.rkt")
          (displayln "ok")
          RKTEOF
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-rmin libexec/test-remote-min.rkt && echo "remote-min: OK" || echo "remote-min: FAIL"
          rm -f libexec/test-remote-min.rkt
          # Test: remote.rkt's requires WITH legacy modules
          cat > libexec/test-remote-full.rkt <<'RKTEOF'
          #lang racket/base
          (require racket/file racket/list racket/match racket/path
                   racket/port racket/string net/http-client net/url
                   "rackup/legacy-plt-catalog.rkt" "rackup/legacy.rkt"
                   "rackup/rktd-io.rkt" "rackup/util.rkt" "rackup/versioning.rkt")
          (displayln "ok")
          RKTEOF
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-rfull libexec/test-remote-full.rkt && echo "remote-full: OK" || echo "remote-full: FAIL"
          rm -f libexec/test-remote-full.rkt
          # Test: actual remote.rkt
          cat > libexec/test-remote.rkt <<'RKTEOF'
          #lang racket/base
          (require "rackup/remote.rkt")
          (displayln "ok")
          RKTEOF
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-remote libexec/test-remote.rkt && echo "remote.rkt: OK" || echo "remote.rkt: FAIL"
          rm -f libexec/test-remote.rkt
      - name: Build executable distribution
        shell: bash
        run: |
          mkdir -p dist
          if [ -n "${{ matrix.cross_target }}" ]; then
            scripts/build-dist.sh \
              --cross "${{ matrix.cross_target }}" \
              --output "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          else
            scripts/build-dist.sh \
              --output "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          fi
      - name: Smoke test (native builds only)
        if: matrix.cross_target == ''
        shell: bash
        run: |
          mkdir -p /tmp/rackup-exe-test
          tar -xzf "dist/rackup-${{ matrix.artifact_name }}.tar.gz" -C /tmp/rackup-exe-test
          export RACKUP_HOME=/tmp/rackup-exe-test/rackup
          /tmp/rackup-exe-test/rackup/bin/rackup version
          /tmp/rackup-exe-test/rackup/bin/rackup help
      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: "rackup-exe-${{ matrix.artifact_name }}"
          path: "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          if-no-files-found: error
