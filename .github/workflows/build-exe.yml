name: Build Exe

on:
  workflow_call:

jobs:
  build-exe:
    name: "Build Exe (${{ matrix.artifact_name }})"
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Only cross-compilation targets for debugging
          - runs_on: ubuntu-latest
            artifact_name: arm32-linux
            setup_racket_arch: x64
            cross_target: arm32-linux
          - runs_on: ubuntu-latest
            artifact_name: i386-linux
            setup_racket_arch: x64
            cross_target: i386-linux
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup Racket
        uses: Bogdanp/setup-racket@v1.14
        with:
          architecture: ${{ matrix.setup_racket_arch }}
          distribution: full
          variant: CS
          version: stable
      - name: Install raco cross (cross-compilation only)
        if: matrix.cross_target != ''
        shell: bash
        run: raco pkg install --auto raco-cross
      - name: Debug cross environment (cross-compilation only)
        if: matrix.cross_target != ''
        shell: bash
        run: |
          echo "=== Racket version ==="
          racket --version
          echo "=== compiled-file-roots ==="
          racket -e '(current-compiled-file-roots)'
          echo "=== PLTCOMPILEDROOTS env ==="
          echo "PLTCOMPILEDROOTS=${PLTCOMPILEDROOTS:-<unset>}"
          echo "=== which racket/raco ==="
          which racket raco
          echo "=== raco-cross-lib checksum ==="
          raco pkg show raco-cross-lib
          echo "=== Test: deep local project (5 modules) ==="
          mkdir -p /tmp/deep-test/lib
          cat > /tmp/deep-test/lib/a.rkt <<'RKTEOF'
          #lang racket/base
          (require racket/file racket/list)
          (provide fn-a)
          (define (fn-a) (list "a" (file->string (make-temporary-file))))
          RKTEOF
          cat > /tmp/deep-test/lib/b.rkt <<'RKTEOF'
          #lang racket/base
          (require racket/date racket/string)
          (provide fn-b)
          (define (fn-b) (string-join (list (date->string (current-date))) ", "))
          RKTEOF
          cat > /tmp/deep-test/lib/c.rkt <<'RKTEOF'
          #lang racket/base
          (require "a.rkt" "b.rkt" racket/runtime-path racket/port net/url)
          (provide fn-c)
          (define-runtime-path here ".")
          (define (fn-c) (list (fn-a) (fn-b) here))
          RKTEOF
          cat > /tmp/deep-test/lib/d.rkt <<'RKTEOF'
          #lang racket/base
          (require racket/cmdline racket/file)
          (provide fn-d)
          (define (fn-d x) (format "d: ~a" x))
          RKTEOF
          cat > /tmp/deep-test/main.rkt <<'RKTEOF'
          #lang racket/base
          (require "lib/c.rkt" "lib/d.rkt" racket/cmdline)
          (command-line #:args () (displayln (fn-c)) (displayln (fn-d "test")))
          RKTEOF
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/deep-test/main-exe /tmp/deep-test/main.rkt && echo "deep-local: OK" || echo "deep-local: FAIL"
          echo "=== Test: rackup source copied to /tmp ==="
          cp -r libexec /tmp/rackup-src
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/rackup-core-tmp /tmp/rackup-src/rackup-core.rkt && echo "rackup-from-tmp: OK" || echo "rackup-from-tmp: FAIL"
          echo "=== Test: rackup-core.rkt from checkout ==="
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/rackup-core-test libexec/rackup-core.rkt && echo "rackup-core: OK" || echo "rackup-core: FAIL"
          echo "=== Check: .zo files after cross-compile ==="
          find libexec -name "*.zo" -type f 2>/dev/null | head -20 || echo "(no .zo in libexec)"
          WS="$HOME/.local/share/racket/raco-cross/9.1"
          echo "=== zo-dir contents ==="
          find "$WS" -path "*/build/zo" -type d 2>/dev/null | while read d; do echo "--- $d ---"; find "$d" -name "*.zo" -type f | head -10; done
      - name: Build executable distribution
        shell: bash
        run: |
          mkdir -p dist
          if [ -n "${{ matrix.cross_target }}" ]; then
            scripts/build-dist.sh \
              --cross "${{ matrix.cross_target }}" \
              --output "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          else
            scripts/build-dist.sh \
              --output "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          fi
      - name: Smoke test (native builds only)
        if: matrix.cross_target == ''
        shell: bash
        run: |
          mkdir -p /tmp/rackup-exe-test
          tar -xzf "dist/rackup-${{ matrix.artifact_name }}.tar.gz" -C /tmp/rackup-exe-test
          export RACKUP_HOME=/tmp/rackup-exe-test/rackup
          /tmp/rackup-exe-test/rackup/bin/rackup version
          /tmp/rackup-exe-test/rackup/bin/rackup help
      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: "rackup-exe-${{ matrix.artifact_name }}"
          path: "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          if-no-files-found: error
