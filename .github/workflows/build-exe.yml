name: Build Exe

on:
  workflow_call:

jobs:
  build-exe:
    name: "Build Exe (${{ matrix.artifact_name }})"
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Only cross-compilation targets for debugging
          - runs_on: ubuntu-latest
            artifact_name: arm32-linux
            setup_racket_arch: x64
            cross_target: arm32-linux
          - runs_on: ubuntu-latest
            artifact_name: i386-linux
            setup_racket_arch: x64
            cross_target: i386-linux
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup Racket
        uses: Bogdanp/setup-racket@v1.14
        with:
          architecture: ${{ matrix.setup_racket_arch }}
          distribution: full
          variant: CS
          version: stable
      - name: Install raco cross (cross-compilation only)
        if: matrix.cross_target != ''
        shell: bash
        run: raco pkg install --auto raco-cross
      - name: Debug cross environment (cross-compilation only)
        if: matrix.cross_target != ''
        shell: bash
        run: |
          echo "=== Racket version ==="
          racket --version
          echo "=== compiled-file-roots ==="
          racket -e '(current-compiled-file-roots)'
          echo "=== PLTCOMPILEDROOTS env ==="
          echo "PLTCOMPILEDROOTS=${PLTCOMPILEDROOTS:-<unset>}"
          echo "=== which racket/raco ==="
          which racket raco
          echo "=== raco-cross-lib checksum ==="
          raco pkg show raco-cross-lib
          echo "=== Binary search: which rackup module triggers the failure ==="
          WD="$(pwd)"
          # Test A: require just paths.rkt (simplest module)
          cat > libexec/test-a.rkt <<'RKTEOF'
          #lang racket/base
          (require "rackup/paths.rkt")
          (displayln "ok")
          RKTEOF
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-a libexec/test-a.rkt && echo "paths.rkt: OK" || echo "paths.rkt: FAIL"
          # Test B: require util.rkt (has net/url, HTTP downloading)
          cat > libexec/test-b.rkt <<'RKTEOF'
          #lang racket/base
          (require "rackup/util.rkt")
          (displayln "ok")
          RKTEOF
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-b libexec/test-b.rkt && echo "util.rkt: OK" || echo "util.rkt: FAIL"
          # Test C: require shell.rkt
          cat > libexec/test-c.rkt <<'RKTEOF'
          #lang racket/base
          (require "rackup/shell.rkt")
          (displayln "ok")
          RKTEOF
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-c libexec/test-c.rkt && echo "shell.rkt: OK" || echo "shell.rkt: FAIL"
          # Test D: require state.rkt
          cat > libexec/test-d.rkt <<'RKTEOF'
          #lang racket/base
          (require "rackup/state.rkt")
          (displayln "ok")
          RKTEOF
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-d libexec/test-d.rkt && echo "state.rkt: OK" || echo "state.rkt: FAIL"
          # Test E: require install.rkt (largest)
          cat > libexec/test-e.rkt <<'RKTEOF'
          #lang racket/base
          (require "rackup/install.rkt")
          (displayln "ok")
          RKTEOF
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-e libexec/test-e.rkt && echo "install.rkt: OK" || echo "install.rkt: FAIL"
          # Test F: require runtime.rkt
          cat > libexec/test-f.rkt <<'RKTEOF'
          #lang racket/base
          (require "rackup/runtime.rkt")
          (displayln "ok")
          RKTEOF
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-f libexec/test-f.rkt && echo "runtime.rkt: OK" || echo "runtime.rkt: FAIL"
          # Clean up test files
          rm -f libexec/test-*.rkt
          # Test G: full rackup-core
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/test-g libexec/rackup-core.rkt && echo "rackup-core: OK" || echo "rackup-core: FAIL"
      - name: Build executable distribution
        shell: bash
        run: |
          mkdir -p dist
          if [ -n "${{ matrix.cross_target }}" ]; then
            scripts/build-dist.sh \
              --cross "${{ matrix.cross_target }}" \
              --output "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          else
            scripts/build-dist.sh \
              --output "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          fi
      - name: Smoke test (native builds only)
        if: matrix.cross_target == ''
        shell: bash
        run: |
          mkdir -p /tmp/rackup-exe-test
          tar -xzf "dist/rackup-${{ matrix.artifact_name }}.tar.gz" -C /tmp/rackup-exe-test
          export RACKUP_HOME=/tmp/rackup-exe-test/rackup
          /tmp/rackup-exe-test/rackup/bin/rackup version
          /tmp/rackup-exe-test/rackup/bin/rackup help
      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: "rackup-exe-${{ matrix.artifact_name }}"
          path: "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          if-no-files-found: error
