name: Build Exe

on:
  workflow_call:

jobs:
  build-exe:
    name: "Build Exe (${{ matrix.artifact_name }})"
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native builds on GHA runners
          - runs_on: ubuntu-latest
            artifact_name: x86_64-linux
            setup_racket_arch: x64
            cross_target: ""
          - runs_on: ubuntu-24.04-arm
            artifact_name: aarch64-linux
            setup_racket_arch: arm64
            cross_target: ""
          - runs_on: macos-15-intel
            artifact_name: x86_64-macosx
            setup_racket_arch: x64
            cross_target: ""
          - runs_on: macos-14
            artifact_name: aarch64-macosx
            setup_racket_arch: arm64
            cross_target: ""
          # Cross-compiled builds for platforms without native GHA runners.
          - runs_on: ubuntu-latest
            artifact_name: arm32-linux
            setup_racket_arch: x64
            cross_target: arm32-linux
          - runs_on: ubuntu-latest
            artifact_name: i386-linux
            setup_racket_arch: x64
            cross_target: i386-linux
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup Racket
        uses: Bogdanp/setup-racket@v1.14
        with:
          architecture: ${{ matrix.setup_racket_arch }}
          distribution: full
          variant: CS
          version: stable
      - name: Install raco cross (cross-compilation only)
        if: matrix.cross_target != ''
        shell: bash
        run: raco pkg install --auto raco-cross
      - name: Debug cross environment (cross-compilation only)
        if: matrix.cross_target != ''
        shell: bash
        run: |
          echo "=== Racket version ==="
          racket --version
          echo "=== compiled-file-roots ==="
          racket -e '(current-compiled-file-roots)'
          echo "=== raco-cross-lib checksum ==="
          raco pkg show raco-cross-lib
          echo "=== Simple cross-compile test ==="
          echo '#lang racket/base' > /tmp/hello.rkt
          echo '(displayln "hello")' >> /tmp/hello.rkt
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/hello-cross /tmp/hello.rkt && echo "Simple: OK" || echo "Simple: FAIL"
          echo "=== Two-module cross-compile test ==="
          mkdir -p /tmp/cross-test
          echo '#lang racket/base' > /tmp/cross-test/helper.rkt
          echo '(provide greet)' >> /tmp/cross-test/helper.rkt
          echo '(define (greet x) (format "hi ~a" x))' >> /tmp/cross-test/helper.rkt
          echo '#lang racket/base' > /tmp/cross-test/main.rkt
          echo '(require "helper.rkt")' >> /tmp/cross-test/main.rkt
          echo '(displayln (greet "world"))' >> /tmp/cross-test/main.rkt
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/cross-test/main /tmp/cross-test/main.rkt && echo "Two-module: OK" || echo "Two-module: FAIL"
          echo "=== Cross-compile rackup-core.rkt ==="
          raco cross --target "${{ matrix.cross_target }}" exe -o /tmp/rackup-core-test libexec/rackup-core.rkt && echo "rackup-core: OK" || echo "rackup-core: FAIL"
      - name: Build executable distribution
        shell: bash
        run: |
          mkdir -p dist
          if [ -n "${{ matrix.cross_target }}" ]; then
            scripts/build-dist.sh \
              --cross "${{ matrix.cross_target }}" \
              --output "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          else
            scripts/build-dist.sh \
              --output "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          fi
      - name: Smoke test (native builds only)
        if: matrix.cross_target == ''
        shell: bash
        run: |
          mkdir -p /tmp/rackup-exe-test
          tar -xzf "dist/rackup-${{ matrix.artifact_name }}.tar.gz" -C /tmp/rackup-exe-test
          export RACKUP_HOME=/tmp/rackup-exe-test/rackup
          /tmp/rackup-exe-test/rackup/bin/rackup version
          /tmp/rackup-exe-test/rackup/bin/rackup help
      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: "rackup-exe-${{ matrix.artifact_name }}"
          path: "dist/rackup-${{ matrix.artifact_name }}.tar.gz"
          if-no-files-found: error
