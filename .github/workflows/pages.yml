name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/pages.yml
      - bin/**
      - libexec/**
      - pages/**
      - scripts/build-pages-site.sh
      - scripts/install.sh
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build static Pages site
        run: |
          sh scripts/build-pages-site.sh _site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
