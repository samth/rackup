name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/pages.yml
      - bin/**
      - docker/**
      - libexec/**
      - pages/**
      - scripts/build-pages-site.rkt
      - scripts/build-pages-site.sh
      - scripts/copy-filtered-tree.sh
      - scripts/docker-test-fresh-install.sh
      - scripts/e2e-fresh-container.sh
      - scripts/install.sh
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Racket
        uses: Bogdanp/setup-racket@v1.14
        with:
          architecture: x64
          distribution: full
          variant: CS
          version: stable
      - name: Install Pages build deps
        run: |
          raco pkg install --auto plt-web
      - name: Build static Pages site
        run: |
          racket -y scripts/build-pages-site.rkt _site
      - name: Archive built site bundle
        run: |
          tar \
            --sort=name \
            --mtime='UTC 1970-01-01' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -czf pages-site.tar.gz \
            -C _site .
          sha256sum pages-site.tar.gz > pages-site.tar.gz.sha256
      - name: Upload built site bundle
        uses: actions/upload-artifact@v4
        with:
          name: pages-site-bundle
          path: |
            pages-site.tar.gz
            pages-site.tar.gz.sha256

  bootstrap-curl-smoke:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Download built site bundle
        uses: actions/download-artifact@v4
        with:
          name: pages-site-bundle
          path: dist
      - name: Extract built site bundle
        run: |
          cd dist
          sha256sum -c pages-site.tar.gz.sha256
          mkdir site
          tar -xzf pages-site.tar.gz -C site
      - name: Verify curl-pipe-sh bootstrap against built site bundle
        run: |
          RACKUP_E2E_PREBUILT_PAGES_DIR="$PWD/dist/site" \
          scripts/docker-test-fresh-install.sh \
            --mode bootstrap-curl \
            --host-racket absent \
            --spec stable

  package-pages-artifact:
    needs:
      - build
      - bootstrap-curl-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - name: Download built site bundle
        uses: actions/download-artifact@v4
        with:
          name: pages-site-bundle
          path: dist
      - name: Extract built site bundle
        run: |
          cd dist
          sha256sum -c pages-site.tar.gz.sha256
          mkdir site
          tar -xzf pages-site.tar.gz -C site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

  deploy:
    needs:
      - package-pages-artifact
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
