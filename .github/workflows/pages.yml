name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/pages.yml
      - .github/workflows/build-exe.yml
      - bin/**
      - docker/**
      - libexec/**
      - pages/**
      - pages/build-pages-site.rkt
      - scripts/copy-filtered-tree.sh
      - test/docker-test-fresh-install.sh
      - test/e2e-fresh-container.sh
      - scripts/install.sh
      - scripts/build-dist.sh
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-exe:
    uses: ./.github/workflows/build-exe.yml

  build:
    needs:
      - build-exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Racket
        uses: Bogdanp/setup-racket@fda0f4d167468421766cea8a36140bd2c3c3450d # v1.14
        with:
          architecture: x64
          distribution: full
          variant: CS
          version: stable
      - name: Install Pages build deps
        run: |
          raco pkg install --auto plt-web
      - name: Download all exe artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rackup-exe-*
          path: /tmp/exe-artifacts
      - name: Build static Pages site
        run: |
          racket -y pages/build-pages-site.rkt _site
          # Copy prebuilt binary tarballs into the pages site with SHA-256 sidecar files
          for artifact_dir in /tmp/exe-artifacts/rackup-exe-*/; do
            for tarball in "$artifact_dir"*.tar.gz; do
              [ -f "$tarball" ] || continue
              base="$(basename "$tarball")"
              cp "$tarball" "_site/$base"
              sha256sum "$tarball" | sed "s|  .*/|  |" > "_site/${base}.sha256"
              echo "Added binary dist: $base (+ .sha256)"
            done
          done
      - name: Archive built site bundle
        run: |
          tar \
            --sort=name \
            --mtime='UTC 1970-01-01' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -czf pages-site.tar.gz \
            -C _site .
          sha256sum pages-site.tar.gz > pages-site.tar.gz.sha256
      - name: Upload built site bundle
        uses: actions/upload-artifact@v4
        with:
          name: pages-site-bundle
          path: |
            pages-site.tar.gz
            pages-site.tar.gz.sha256

  bootstrap-curl-smoke:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Download built site bundle
        uses: actions/download-artifact@v4
        with:
          name: pages-site-bundle
          path: dist
      - name: Extract built site bundle
        run: |
          cd dist
          sha256sum -c pages-site.tar.gz.sha256
          mkdir site
          tar -xzf pages-site.tar.gz -C site
      - name: Verify curl-pipe-sh bootstrap against built site bundle
        run: |
          RACKUP_E2E_PREBUILT_PAGES_DIR="$PWD/dist/site" \
          test/docker-test-fresh-install.sh \
            --mode bootstrap-curl \
            --host-racket absent \
            --spec stable

  package-pages-artifact:
    needs:
      - build
      - bootstrap-curl-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - name: Download built site bundle
        uses: actions/download-artifact@v4
        with:
          name: pages-site-bundle
          path: dist
      - name: Extract built site bundle
        run: |
          cd dist
          sha256sum -c pages-site.tar.gz.sha256
          mkdir site
          tar -xzf pages-site.tar.gz -C site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

  deploy:
    needs:
      - package-pages-artifact
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
