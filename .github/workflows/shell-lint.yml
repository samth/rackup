name: Shell Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shell-lint:
    name: Shell Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Collect shell scripts
        shell: bash
        run: |
          # Find all .sh files plus known shell scripts without extensions
          (
            find . -name '*.sh' -type f
            echo ./bin/rackup
          ) | sort -u > /tmp/shell-scripts.txt
          echo "Found shell scripts:"
          cat /tmp/shell-scripts.txt

      - name: ShellCheck
        shell: bash
        run: |
          xargs shellcheck --severity=warning < /tmp/shell-scripts.txt

      - name: Install shfmt
        uses: mfinelli/setup-shfmt@8ec8aa2cfd83a7d20a6fb746c638aae1bc181ce9 # v2

      - name: shfmt (formatting check)
        shell: bash
        run: |
          xargs shfmt -d -i 2 -ci < /tmp/shell-scripts.txt

      - name: Install checkbashisms
        run: sudo apt-get install -y -qq devscripts

      - name: install.sh smoke (self-upgrade code path)
        shell: bash
        run: |
          # Verify install.sh can be parsed and reach the download phase
          # under /bin/sh in self-upgrade mode.  This catches function-ordering
          # bugs where a function is called before it is defined.
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          # The script will try to download a checksum and fail, which is fine.
          # We just need it to get past all function definitions and the
          # up-to-date check without "not found" errors.
          set +e
          output="$(RACKUP_BOOTSTRAP_MODE=self-upgrade \
            /bin/sh scripts/install.sh -y --no-init --prefix "$tmp/rackup" 2>&1)"
          rc=$?
          set -e
          echo "$output"
          # The script should fail with a download error, not a "not found" error.
          if echo "$output" | grep -q ': not found'; then
            echo "FAIL: install.sh has an undefined function reference"
            exit 1
          fi
          echo "install.sh self-upgrade smoke OK (exit=$rc)"

      - name: Check workflow action pinning
        shell: bash
        run: |
          bad_refs="$(git ls-files '.github/workflows/*.yml' |
            xargs grep -HnE '^\s*uses:\s*[^@[:space:]]+@[^[:space:]]+' |
            grep -Ev '^\s*uses:\s*\./|@[0-9a-f]{40}(\s|$)' || true)"
          if [ -n "$bad_refs" ]; then
            echo "Unpinned workflow actions detected:"
            echo "$bad_refs"
            exit 1
          fi

      - name: Check workflow permissions scope
        shell: bash
        run: |
          # Verify that write permissions only appear in pages.yml deploy job.
          # We check every workflow file for lines containing "write" in a
          # permissions context and ensure they are scoped correctly.
          rc=0
          for f in .github/workflows/*.yml; do
            base="$(basename "$f")"
            # Use awk to find "write" inside permissions blocks
            # For pages.yml we allow write only inside the deploy job
            while IFS=: read -r lineno line; do
              # Skip comments
              stripped="${line#"${line%%[! ]*}"}"
              case "$stripped" in '#'*) continue ;; esac
              if [ "$base" = "pages.yml" ]; then
                # We need to check this write is inside the deploy job permissions
                # Read context: lines before this to find the job
                job="$(head -n "$lineno" "$f" | grep -E '^\s{2}\S+:' | tail -1 | sed 's/:.*//' | tr -d ' ')"
                if [ "$job" != "deploy" ]; then
                  echo "$f:$lineno: write permission outside deploy job (in $job): $line"
                  rc=1
                fi
              else
                echo "$f:$lineno: write permission not allowed: $line"
                rc=1
              fi
            done < <(grep -nE ':\s*write\b' "$f" | grep -v '^\s*#' || true)
          done
          if [ "$rc" -ne 0 ]; then
            echo "Write permissions must only appear in pages.yml deploy job"
          fi
          exit "$rc"

      - name: checkbashisms (POSIX portability)
        shell: bash
        run: |
          # Collect scripts with #!/bin/sh shebangs
          posix_scripts=()
          while IFS= read -r f; do
            if head -1 "$f" | grep -q '^#!.*/bin/sh'; then
              posix_scripts+=("$f")
            fi
          done < /tmp/shell-scripts.txt

          if [ ${#posix_scripts[@]} -eq 0 ]; then
            echo "No POSIX sh scripts found, skipping."
            exit 0
          fi

          echo "POSIX sh scripts:"
          printf '  %s\n' "${posix_scripts[@]}"

          # checkbashisms has known parser limitations with embedded quotes
          # in single-quoted strings. Run per-file and collect real failures
          # separately from parse errors.
          rc=0
          for f in "${posix_scripts[@]}"; do
            if ! output="$(checkbashisms "$f" 2>&1)"; then
              # Filter out pure parse-error-only failures (exit 2 = skipped/parse error)
              if echo "$output" | grep -q '^possible bashism'; then
                printf '%s\n' "$output"
                rc=1
              elif echo "$output" | grep -q '^error:'; then
                echo "checkbashisms: parser warning for $f (non-fatal):"
                echo "$output" | grep '^error:' | sed 's/^/  /'
              fi
            fi
          done
          exit "$rc"
